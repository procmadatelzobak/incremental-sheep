name: Pages previews

on:
  push:
    branches: [main]
  pull_request_target:
    types: [opened, reopened, synchronize, closed, ready_for_review, converted_to_draft]
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read
  issues: write
  pull-requests: read
  pages: write
  id-token: write

concurrency:
  group: pages-previews
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pr_previews: ${{ steps.preview-manifest.outputs.pr_previews }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Test
        run: npm test

      - name: Build Pages artifact
        run: npm run build:pages
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Export PR preview manifest
        id: preview-manifest
        run: |
          {
            echo 'pr_previews<<PR_PREVIEWS_JSON'
            cat dist/pages/previews/pr-previews.json
            printf '\nPR_PREVIEWS_JSON\n'
          } >> "$GITHUB_OUTPUT"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Comment PR preview URLs
        run: node scripts/comment-pr-previews.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_PREVIEWS_JSON: ${{ needs.build.outputs.pr_previews }}
